<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f5f6f4;font-family:Arial,Helvetica,sans-serif;color:#20211f;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #dfe1dc;border-radius:8px;">
            <tr>
              <td style="padding:32px 36px 34px;">
                <img src="https://vyrpbanleygvqcjyiiwq.supabase.co/storage/v1/object/public/branding/coursepilot-email-logo.png" width="220" alt="CoursePilot AI" style="display:block;width:220px;max-width:100%;height:auto;margin:0 0 20px;">
                <div style="height:1px;background:#e7e8e4;margin:0 0 28px;"></div>
                <h1 style="margin:0 0 16px;font-size:25px;line-height:1.25;color:#171817;">Confirm your email</h1>
                <p style="margin:0 0 10px;font-size:16px;line-height:1.55;">{{ if .Data.preferred_name }}Hi {{ .Data.preferred_name }},{{ else }}Hi,{{ end }}</p>
                <p style="margin:0 0 26px;font-size:16px;line-height:1.55;color:#4e504c;">You are almost ready. Confirm your email address to finish setting up your CoursePilot account.</p>
                <p style="margin:0 0 28px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#1167dc;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;padding:13px 20px;border-radius:6px;">Confirm my email</a>
                </p>
                <p style="margin:0;color:#777a74;font-size:12px;line-height:1.55;">If you did not create a CoursePilot account, no action is needed.</p>
              </td>
            </tr>
          </table>
          <p style="margin:18px 0 0;color:#8a8d87;font-size:12px;">CoursePilot AI</p>
        </td>
      </tr>
    </table>
  </body>
</html>
