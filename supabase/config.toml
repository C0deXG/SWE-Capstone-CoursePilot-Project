project_id = "coursepilot"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173/reset-password"]
jwt_expiry = 3600
enable_signup = true

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "1m"
otp_length = 8

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "onboarding@resend.dev"
sender_name = "CoursePilot"

[auth.email.template.confirmation]
subject = "Confirm your CoursePilot account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your CoursePilot password"
content_path = "./supabase/templates/recovery.html"

[storage]
enabled = true
file_size_limit = "50MiB"

[functions.process-course-file]
verify_jwt = true

[functions.ask-course]
verify_jwt = true
